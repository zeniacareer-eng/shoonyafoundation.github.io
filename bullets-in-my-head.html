    <h1>Bullets in My Head</h1>
    <p>The noise that doesn’t kill—but wakes you up</p>
  </header>

  <div class="content">
    <div class="poem">
Bullets in my head  
are fired every moment.  

They don’t kill—  
they steal my breath  
over things that never mattered.  

I almost wish they did kill me.  

But instead,  
they keep me awake—  
awake to the danger  
that lives within.
